version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cinevault-db
    environment:
      POSTGRES_DB: cinevault
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password    # Set this properly in security deployment config
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./backend/db/views.sql:/docker-entrypoint-initdb.d/2_views.sql
      - ./backend/db/populate_major_cities.sql:/docker-entrypoint-initdb.d/3_populate_cities.sql
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cinevault-backend
    ports:
      - "5000:5000"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/cinevault
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cinevault-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
